<svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="145%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#f97316" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Square badge with rounded corners -->
  <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#bgG)" filter="url(#sh)"/>
  <rect x="0" y="0" width="56" height="28" rx="14" fill="url(#gloss)"/>
  <rect x="0" y="16" width="56" height="12" fill="url(#gloss)"/>

  <!-- Large A -->
  <text
    x="6"
    y="38"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    fill="#ffffff"
  >A</text>

  <!-- Small fo superscript -->
  <text
    x="33"
    y="26"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    fill="rgba(255,255,255,0.75)"
  >fo</text>
</svg>
